<h1>Registrar nuevo departamento</h1>

<form method="POST">
    {% csrf_token %}
    <h3>Datos del Empleado</h3>
    <p>
        {{ form.nombre }}
    </p>
    <p>
        {{ form.apellidos }}
    </p>
    <h3>Datos del Departamento</h3>
    <p>
        {{ form.departamento }}
    </p>
    <p>
        {{ form.shorname }}
    </p>
    <!-- {{ form.as_p }} Muestra todos los campos -->
    <button type="submit">Guardar</button>
</form>
